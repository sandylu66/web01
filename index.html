<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人介紹 | Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-container">
        <div class="profile-header">
            <div class="avatar">Profile</div>
            <h2>王大明</h2>
            <p>Front-End Developer / Designer</p>
        </div>

        <div class="profile-content">
            
            <div class="section">
                <div class="section-title">關於我</div>
                <p>
                    專注於打造兼具美感與實用性的數位體驗。喜愛簡約、富有細節的日系設計風格，並熱衷於透過乾淨的代碼將設計轉化為直覺的網頁介面。
                </p>
            </div>

            <div class="section">
                <div class="section-title">Skills</div>
                <div class="tag-container">
                    <span class="tag">HTML5 / CSS3</span>
                    <span class="tag">JavaScript</span>
                    <span class="tag">Vue.js</span>
                    <span class="tag">Tailwind CSS</span>
                    <span class="tag">Responsive Design</span>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Interests</div>
                <div class="tag-container">
                    <span class="tag">日本鐵道旅行</span>
                    <span class="tag">網頁設計</span>
                    <span class="tag">手作工藝</span>
                    <span class="tag">季節限定風景</span>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Links</div>
                <div class="links-container">
                    <a href="#" class="link-item" target="_blank">Portfolio 作品集</a>
                    <a href="#" class="link-item" target="_blank">GitHub</a>
                    <a href="#" class="link-item" target="_blank">Email 聯絡我</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
